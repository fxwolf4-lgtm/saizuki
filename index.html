  <style>
    /* ── HOME — Carousel ── */
    body { overflow-x: hidden; }

    .carousel {
      position: relative;
      width: 100vw;
      height: 100svh;
      overflow: hidden;
    }
    .carousel-slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.4s ease;
    }
    .carousel-slide.active { opacity: 1; }
    .carousel-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      /* Scale animation for depth */
      transform: scale(1.06);
      transition: transform 7s ease;
    }
    .carousel-slide.active img { transform: scale(1); }

    /* Overlay gradient */
    .carousel::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom,
          rgba(10,10,10,0.3) 0%,
          transparent 30%,
          transparent 60%,
          rgba(10,10,10,0.75) 100%);
      pointer-events: none;
      z-index: 2;
    }

    /* Centre logo */
    .carousel-logo {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      pointer-events: none;
      animation: logofade 2s ease forwards;
    }
    @keyframes logofade {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .carousel-logo-main {
      font-family: var(--font-display);
      font-weight: 300;
      font-size: clamp(2.2rem, 5vw, 4rem);
      letter-spacing: 0.35em;
      color: #fff;
      text-shadow: 0 2px 40px rgba(0,0,0,0.4);
    }
    .carousel-logo-sub {
      font-size: 0.6rem;
      letter-spacing: 0.5em;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* Dot indicators */
    .carousel-dots {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 4;
      display: flex;
      gap: 10px;
    }
    .carousel-dot {
      width: 20px; height: 1px;
      background: rgba(255,255,255,0.3);
      cursor: pointer;
      transition: background 0.3s, width 0.3s;
    }
    .carousel-dot.active {
      width: 40px;
      background: var(--accent);
    }

    /* Scroll hint */
    .scroll-hint {
      position: absolute;
      bottom: 32px;
      right: 48px;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: pulse 2.5s ease infinite;
    }
    .scroll-hint span {
      font-size: 0.55rem;
      letter-spacing: 0.35em;
      color: rgba(255,255,255,0.5);
      writing-mode: vertical-rl;
      text-transform: uppercase;
    }
    .scroll-hint-line {
      width: 1px;
      height: 48px;
      background: linear-gradient(to bottom, transparent, var(--accent));
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    /* ── NEWS preview section ── */
    .home-news {
      padding: 100px 48px 80px;
      max-width: 900px;
      margin: 0 auto;
    }
    .news-list { display: flex; flex-direction: column; }
    .news-item {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 24px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      transition: opacity 0.3s;
    }
    .news-item:hover { opacity: 0.7; }
    .news-date {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      padding-top: 3px;
    }
    .news-cat {
      display: inline-block;
      font-size: 0.5rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 2px 8px;
      margin-bottom: 8px;
    }
    .news-title {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      line-height: 1.7;
    }

    .view-more-wrap {
      text-align: center;
      margin-top: 56px;
    }
    .btn-outline {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 14px 40px;
      color: var(--text-muted);
      transition: border-color 0.3s, color 0.3s;
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    @media (max-width: 768px) {
      .carousel-logo-main { font-size: clamp(1.8rem, 8vw, 2.5rem); }
      .scroll-hint { display: none; }
      .home-news { padding: 60px 24px; }
      .news-item { grid-template-columns: 1fr; gap: 8px; }
    }
  </style>

<script>
  /* ── Carousel logic ── */
  const slides = document.querySelectorAll('.carousel-slide');
  const dotsWrap = document.getElementById('dots');
  let current = 0, timer;

  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    d.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(d);
  });

  function goTo(n) {
    slides[current].classList.remove('active');
    dotsWrap.children[current].classList.remove('active');
    current = (n + slides.length) % slides.length;
    slides[current].classList.add('active');
    dotsWrap.children[current].classList.add('active');
    resetTimer();
  }

  function next() { goTo(current + 1); }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, 5000);
  }
  resetTimer();

  /* ── News preview (最新3件) ── */
  if (typeof NEWS_DATA !== 'undefined') {
    const list = document.getElementById('news-preview');
    NEWS_DATA.slice(0, 3).forEach(n => {
      list.innerHTML += `
        <div class="news-item fade-in">
          <div class="news-date">${n.date}</div>
          <div>
            <span class="news-cat">${n.category}</span>
            <div class="news-title">${n.title}</div>
          </div>
        </div>`;
    });
  }
</script>
