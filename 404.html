  <style>
    .error-wrap {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px;
    }
    .error-code {
      font-family: var(--font-display);

      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--accent);
      line-height: 1;
    }
    .error-message {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin: 24px 0 48px;
      line-height: 1.8;
    }
    .error-back {
      display: inline-block;
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      padding: 14px 40px;
      color: var(--text-muted);
      transition: border-color 0.3s, color 0.3s;
    }
    .error-back:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
